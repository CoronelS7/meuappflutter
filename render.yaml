services:
  - type: web
    name: pedido-facil-stripe-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_API_VERSION
        value: 2024-06-20
      - key: HOST
        value: 0.0.0.0
