name: meu_app_flutter
description: "A new Flutter project."

# Impede que o projeto seja publicado no pub.dev
publish_to: 'none'

# Versão do app
version: 1.0.0+1

# Versão do SDK do Dart
environment:
  sdk: ^3.10.7

# ========================
# 📦 DEPENDÊNCIAS
# ========================
dependencies:

  flutter:
    sdk: flutter

  # Ícones padrão estilo iOS
  cupertino_icons: ^1.0.8

  # Suporte a SVG (para usar ícones SVG)
  flutter_svg: ^2.2.3
  
  # 🔥 FIREBASE
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  flutter_slidable: ^3.0.1

  # 💳 STRIPE
  flutter_stripe: ^10.1.1

  # Outros
  crypto: ^3.0.3
  mask_text_input_formatter: ^2.9.0
  diacritic: ^0.1.3

# ========================
# 🧪 DEPENDÊNCIAS DE DEV
# ========================
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Regras de boas práticas de código
  flutter_lints: ^6.0.0

  flutter_native_splash: ^2.3.6

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/imagens/logo.png
  android: true
  ios: true

# ========================
# 🎨 CONFIGURAÇÕES FLUTTER
# ========================
flutter:

  # Garante que os ícones Material estejam disponíveis
  uses-material-design: true

  # ========================
  # 🖼️ ASSETS
  # ========================
  assets:
    - assets/icones/
    - assets/imagens/

  # ========================
  # 🔤 FONTES
  # ========================
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fontes/Poppins-Regular.ttf