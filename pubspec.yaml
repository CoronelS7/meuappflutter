name: meu_app_flutter
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  flutter_stripe: ^10.1.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  crypto: ^3.0.3
  mask_text_input_formatter: ^2.9.0
  diacritic: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.3.6

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/imagens/logo.png
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/icones/
    - assets/imagens/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fontes/Poppins-Regular.ttf
